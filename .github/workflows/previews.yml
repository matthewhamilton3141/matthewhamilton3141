name: Contribution graph previews

# One-off, manually triggered. Renders every contribution-graph variant from
# the real account data and pushes the SVGs to the `output` branch so they can
# be previewed. Safe to delete once a style is chosen.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  previews:
    runs-on: ubuntu-latest
    steps:
      - name: Snake variants (green + Rayquaza gold)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-green.svg?color_snake=76b900&color_dots=161b22,0e4429,006d32,26a641,39d353
            dist/snake-rayquaza.svg?color_snake=f5c518&color_dots=161b22,3d3300,7a6600,b39900,f5c518

      - name: 3D isometric calendar variants
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect all SVGs
        run: |
          mkdir -p dist
          cp profile-3d-contrib/*.svg dist/ 2>/dev/null || true
          ls -la dist

      - name: Push previews to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
